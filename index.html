<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Statistics Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="shell">
    <header class="hero">
      <p class="eyebrow" id="timeGreeting">Loading greeting...</p>
      <h1>GitHub Statistics</h1>
      <p class="subtitle">Real data only. Generated by GitHub API, displayed by GitHub Pages.</p>
      <div class="controls">
        <span class="badge" id="scopeBadge">Scope: loading...</span>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <section class="status" id="statusBox">Loading stats...</section>

    <section class="grid" id="statsGrid" aria-live="polite"></section>

    <footer class="footer">
      <p id="generatedAt">Generated at: -</p>
      <p id="sourceNote">Source: GitHub REST + GraphQL APIs</p>
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
