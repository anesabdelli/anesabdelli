name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: ["main"]
    paths:
      - "scripts/fetch-stats.mjs"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate stats JSON
        env:
          GH_USERNAME: ${{ vars.GH_USERNAME || github.repository_owner }}
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-stats.mjs

      - name: Commit stats file if changed
        run: |
          if git diff --quiet -- assets/stats.json; then
            echo "No changes in stats file"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/stats.json
          git commit -m "chore: update GitHub stats"
          git push
